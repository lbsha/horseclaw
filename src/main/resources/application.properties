# HorseClaw Configuration
# 马力全开，爪到成功

# Application
app.name=HorseClaw
app.version=1.0.0-SNAPSHOT
app.description=AI-driven Java development engine

# Pipeline
pipeline.max-iterations=1000
pipeline.commit-threshold=3
pipeline.max-commits-per-hour=50

# MiniMax API
minimax.api.key=${MINIMAX_API_KEY:}
minimax.model=MiniMax-M2.5
minimax.temperature=0.7

# Logging
logging.level.com.horseclaw=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n
